aid: agile-delivery
name: Agile Delivery
description: A collection of resources, tools, and APIs related to agile delivery practices — the iterative approach to project management and software delivery that helps teams ship value faster 
  through sprints, continuous feedback, and adaptive planning. Agile delivery frameworks emphasize cross-functional collaboration, working software over documentation, and responding to change over 
  following a plan. This topic covers project management APIs, sprint planning tools, backlog management platforms, and delivery metrics services used to implement agile delivery at scale.
